---
name: CI
on:
  push:
    branches: [master]
    tags: [v*]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  main:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_DB: recueil
          POSTGRES_USER: recueil
          POSTGRES_PASSWORD: recueil
        options: >-
          --health-cmd pg_isready --health-interval 10s --health-timeout 5s
          --health-retries 5
        ports:
          - "5432:5432"
    steps:
      - run: sudo apt-get update
      - run: sudo apt-get install -y docker-compose-v2
      - uses: actions/checkout@v7
        with:
          submodules: true
      - uses: actions/setup-go@v6
        with:
          cache: true
          go-version-file: go.mod
      - uses: pnpm/action-setup@v6
        with:
          version: latest
      - uses: actions/setup-node@v6
        with:
          cache: pnpm
          node-version: lts/*
      - uses: sqlc-dev/setup-sqlc@v5
        with:
          sqlc-version: 1.31.1
      - uses: opentofu/setup-opentofu@v2
        with:
          tofu_wrapper: false
      - run: docker compose --profile ci up -d
      - run: |
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:9222/json/version > /dev/null && exit 0
            sleep 1
          done
          echo "chromedp sidecar did not become ready in time" >&2
          exit 1
      - run: go install github.com/kisielk/errcheck@latest
      - run: go install github.com/go-critic/go-critic/cmd/go-critic@latest
      - run: tofu fmt -check -recursive
      - run: pnpm ci
      - run: pnpm run check
      - run: pnpm run types
      - run: pnpm run lint
      - run: go mod download
      - run: "[[ -z $(go fmt ./...) ]]"
      - run: pnpm run build
      - run: make
      - run: go test -race -p 1 -v ./...
      - run: go vet ./...
      - run: pnpm run test
      - run: ./scripts/versions.bash
      - uses: dominikh/staticcheck-action@v1
        with:
          install-go: false
      - run: >-
          # TODO: remove true https://github.com/WebReflection/flatted/pull/101
          go-critic check -checkGenerated=false -checkTests=true -enableAll
          ./... || true
      - run: errcheck -ignoregenerated ./...
      - run: pnpm run --filter=@recueil/terraform types
      - run: pnpm run --filter=@recueil/extension types
      - run: pnpm run package
        working-directory: extension
      - uses: actions/upload-artifact@v7
        with:
          name: extension
          path: extension/dist/packages/*
          retention-days: 2

  docker:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: true
      - run: echo "gitsha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
        id: gitsha
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      - uses: docker/metadata-action@v6
        id: docker
        with:
          images: |
            mfinelli/recueil
            ghcr.io/mfinelli/recueil
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}},enable=${{ !startsWith(github.ref, 'refs/tags/v0.') }}
      - uses: docker/login-action@v4
        if: github.event_name != 'pull_request'
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - uses: docker/login-action@v4
        if: github.event_name != 'pull_request'
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_TOKEN }}
      - uses: docker/build-push-action@v7
        with:
          build-args: GITSHA=${{ steps.gitsha.outputs.gitsha }}
          platforms: linux/amd64,linux/arm64
          push: ${{ startsWith(github.ref, 'refs/tags/') }}
          tags: ${{ steps.docker.outputs.tags }}
      - uses: peter-evans/dockerhub-description@v5
        if: startsWith(github.ref, 'refs/tags/')
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          repository: mfinelli/recueil
          short-description: ${{ github.event.repository.description }}

  web:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [main, docker]
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: latest
      - uses: actions/setup-node@v6
        with:
          cache: pnpm
          node-version: lts/*
      - uses: taiki-e/install-action@v2
        with:
          tool: zola@0.22.1
      - run: pnpm ci
      - run: zola build --minify
        working-directory: www
      - run: pnpm exec wrangler pages deploy www/public --project-name recueil
        if: github.event_name != 'pull_request'
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      - uses: mfinelli/cloudflare-pages-cleanup@v1
        if: github.event_name != 'pull_request'
        with:
          cloudflare_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          project: recueil
          min-to-keep: 3
          max-to-keep: 3

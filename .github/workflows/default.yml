---
name: CI
on:
  push:
    branches: [master]
    tags: [v*]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  main:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: opentofu/setup-opentofu@v2
        with:
          tofu_wrapper: false
      - run: tofu fmt -check -recursive terraform

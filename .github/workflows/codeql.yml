---
name: CodeQL
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    - cron: "21 22 * * 0" # 22:21 UTC on Sunday

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      security-events: write
      actions: read
      contents: read
      packages: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: actions
            build-mode: none
          - language: go
            build-mode: manual
          - language: javascript-typescript
            build-mode: none
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: true
      - uses: actions/setup-go@v6
        with:
          cache: true
          go-version-file: go.mod
      - uses: pnpm/action-setup@v6
        with:
          version: latest
      - uses: actions/setup-node@v6
        with:
          cache: pnpm
          node-version: lts/*
      - uses: sqlc-dev/setup-sqlc@v5
        with:
          sqlc-version: 1.31.1
      - uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
      - run: |
          pnpm ci
          go mod download
          make
        if: matrix.build-mode == 'manual'
      - uses: github/codeql-action/analyze@v4
        with:
          category: /language:${{ matrix.language }}

---
version: "2"
sql:
  - engine: postgresql
    gen:
      go:
        emit_empty_slices: true
        emit_json_tags: true
        emit_prepared_queries: true
        out: internal/db
        package: db
        sql_package: pgx/v5
        overrides:
          - db_type: "regconfig"
            go_type: "string"
    queries: queries
    schema: migrations

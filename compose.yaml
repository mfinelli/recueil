---
services:
  postgresql-local:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: recueil
      POSTGRES_USER: recueil
      POSTGRES_PASSWORD: recueil
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - recueilpsql:/var/lib/postgresql
    profiles:
      - local

  postgresql-test:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: recueil
      POSTGRES_USER: recueil
      POSTGRES_PASSWORD: recueil
    ports:
      - "127.0.0.1:5432:5432"
    command:
      - postgres
      - -c
      - log_statement=all
    tmpfs:
      - /var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U recueil"]
      interval: 2s
      timeout: 3s
      retries: 20
    profiles:
      - test

volumes:
  recueilpsql:
